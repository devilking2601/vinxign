<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="/images/Logo (1).png" />
  <title>Vinxign | Coming Soon</title>
  <style>
    :root {
      --primary: #8b5cf6;
      --secondary: #ec4899;
      --bg: #0f172a;
      --text: #f1f5f9;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .logo {
      font-family: Georgia, 'Times New Roman', Times, serif;
      font-size: 2rem;
      font-weight: bold;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 3rem;
      margin: 0.5rem 0;
      animation: fadeInUp 1s ease-out forwards;
    }

    p {
      font-size: 1.25rem;
      max-width: 500px;
      color: #cbd5e1;
      animation: fadeInUp 1.5s ease-out forwards;
    }

    .gradient-bar {
      width: 100px;
      height: 4px;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      margin-top: 1.5rem;
      animation: slideIn 1s ease-in-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        width: 0;
      }
      to {
        width: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="logo">Vinxign</div>
  <h1>Coming Soon 🚀</h1>
  <p>We're working hard to bring you the next-gen social media experience.<br> Stay tuned for something amazing.</p>
  <div class="gradient-bar"></div>
</body>
</html>
